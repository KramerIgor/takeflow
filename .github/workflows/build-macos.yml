name: Build macOS packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub Release tag to receive the DMG files
        required: true
        default: v0.1.4-beta
      publish_release:
        description: Upload the verified DMG files to the existing release
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            asset_arch: AppleSilicon
          - runner: macos-15-intel
            arch: x86_64
            asset_arch: Intel
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    env:
      PYTHON_DOTENV_DISABLED: "1"
      SEGMIND_API_KEY: ""
      TAKEFLOW_UPDATE_MANIFEST_URL: ""

    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Build app and DMG
        run: bash scripts/build_macos_dmg.sh "${{ matrix.arch }}"

      - name: Smoke-test packaged app
        shell: bash
        run: |
          set -euo pipefail
          app="dist/macos/${{ matrix.arch }}/Takeflow.app"
          export TAKEFLOW_OPEN_BROWSER=0
          export TAKEFLOW_PORT=7861
          export TAKEFLOW_DATA_DIR="$RUNNER_TEMP/takeflow-data"
          export TAKEFLOW_ENV_PATH="$RUNNER_TEMP/takeflow-data/.env"
          export TAKEFLOW_LOG_DIR="$RUNNER_TEMP/takeflow-logs"
          export OUTPUT_ROOT="$RUNNER_TEMP/takeflow-output"
          "$app/Contents/MacOS/Takeflow" &
          pid=$!
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          for attempt in {1..40}; do
            if curl --fail --silent http://127.0.0.1:7861/health > "$RUNNER_TEMP/health.json"; then
              break
            fi
            sleep 0.5
          done
          python -c 'import json, os; data=json.load(open(os.environ["RUNNER_TEMP"] + "/health.json")); assert data["ok"] is True; print(data["version"])'
          test -f "$RUNNER_TEMP/takeflow-data/seedance_gui.sqlite3"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: takeflow-macos-${{ matrix.arch }}
          path: |
            dist/Takeflow-*-macOS-${{ matrix.asset_arch }}.dmg
            dist/Takeflow-*-macOS-${{ matrix.asset_arch }}.dmg.sha256
          if-no-files-found: error

  publish:
    name: Publish DMG assets
    if: ${{ inputs.publish_release }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download verified packages
        uses: actions/download-artifact@v4
        with:
          pattern: takeflow-macos-*
          merge-multiple: true
          path: release-assets

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.release_tag }}" release-assets/*.dmg release-assets/*.sha256 --repo "${{ github.repository }}" --clobber
