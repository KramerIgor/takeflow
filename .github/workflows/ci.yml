name: Safe checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      PYTHON_DOTENV_DISABLED: "1"
      TAKEFLOW_UPDATE_MANIFEST_URL: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python
        run: python -m compileall app scripts takeflow_launcher.py

      - name: Run release readiness checks
        run: python -u scripts/check_release_readiness.py

      - name: Run safe regression diagnostics
        run: python -u scripts/check_stage11_final_diagnostics.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check frontend syntax
        shell: pwsh
        run: |
          node --check app/static/app.js
          Get-ChildItem app/static/js/*.js | ForEach-Object {
            node --check $_.FullName
          }
