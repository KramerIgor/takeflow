name: Build Windows installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub tag to build and publish
        required: true
        default: v0.1.4-beta
      publish_release:
        description: Create/update the GitHub pre-release and upload the installer
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 25
    env:
      PYTHON_DOTENV_DISABLED: "1"
      SEGMIND_API_KEY: ""
      TAKEFLOW_UPDATE_MANIFEST_URL: ""

    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install -r requirements.txt pyinstaller
          choco install innosetup --yes --no-progress

      - name: Validate release source
        shell: pwsh
        run: |
          $expectedTag = python -c "from app.version import APP_RELEASE_TAG; print(APP_RELEASE_TAG)"
          if ($expectedTag.Trim() -ne "${{ inputs.release_tag }}") {
            throw "Requested tag does not match app.version: $expectedTag"
          }
          python -m compileall app scripts takeflow_launcher.py
          python -u scripts/check_release_readiness.py

      - name: Build installer
        shell: pwsh
        run: .\scripts\build_windows_installer.ps1

      - name: Smoke-test packaged app
        shell: pwsh
        run: |
          $env:TAKEFLOW_OPEN_BROWSER = "0"
          $env:TAKEFLOW_PORT = "7861"
          $env:TAKEFLOW_DATA_DIR = Join-Path $env:RUNNER_TEMP "takeflow-data"
          $env:TAKEFLOW_ENV_PATH = Join-Path $env:RUNNER_TEMP "takeflow-data\.env"
          $env:TAKEFLOW_LOG_DIR = Join-Path $env:RUNNER_TEMP "takeflow-logs"
          $env:OUTPUT_ROOT = Join-Path $env:RUNNER_TEMP "takeflow-output"
          $process = Start-Process -FilePath ".\dist\takeflow\Takeflow.exe" -PassThru
          try {
            $health = $null
            for ($attempt = 0; $attempt -lt 40 -and -not $health; $attempt++) {
              Start-Sleep -Milliseconds 500
              try {
                $health = Invoke-RestMethod "http://127.0.0.1:7861/health" -TimeoutSec 2
              } catch {}
            }
            if (-not $health -or -not $health.ok) {
              throw "Packaged app did not pass the health check."
            }
            $expectedVersion = python -c "from app.version import APP_VERSION; print(APP_VERSION)"
            if ($health.version -ne $expectedVersion.Trim()) {
              throw "Packaged version mismatch: $($health.version)"
            }
            if (Get-ChildItem ".\dist\takeflow" -Recurse -Force -File | Where-Object Name -eq ".env") {
              throw "Safety stop: .env was included in the package."
            }
          } finally {
            $listener = Get-NetTCPConnection -LocalPort 7861 -State Listen -ErrorAction SilentlyContinue
            if ($listener) {
              Stop-Process -Id $listener.OwningProcess -Force -ErrorAction SilentlyContinue
            }
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Create checksum
        shell: pwsh
        run: |
          $version = python -c "from app.version import APP_VERSION; print(APP_VERSION)"
          $installer = ".\dist\installer\TakeflowSetup-$($version.Trim()).exe"
          $hash = (Get-FileHash -Algorithm SHA256 $installer).Hash.ToLowerInvariant()
          "$hash  $(Split-Path $installer -Leaf)" | Set-Content "$installer.sha256" -Encoding ascii

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: takeflow-windows-x64
          path: |
            dist/installer/TakeflowSetup-*.exe
            dist/installer/TakeflowSetup-*.exe.sha256
          if-no-files-found: error

      - name: Publish GitHub pre-release
        if: ${{ inputs.publish_release }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $displayVersion = python -c "from app.version import APP_VERSION_DISPLAY; print(APP_VERSION_DISPLAY)"
          $notes = @"
          ## Русский

          - Обновлены Single Generation и Queue: компактные действия, локализация и понятные ошибки.
          - Добавлены случайный seed по умолчанию, сохранение фактического seed и немедленное применение API-настроек.
          - История обновляет только активные карточки, не сбивая курсор и не перезагружая готовые видео.
          - Исправлены вставка скриншотов как референсов, параллельная очередь и устаревший JS-кэш.

          ## English

          - Polished Single Generation and Queue actions, localization, and error states.
          - Added random seed defaults, actual seed persistence, and immediately applied API settings.
          - History polling patches active cards without moving the prompt caret or reloading completed videos.
          - Fixed clipboard references, parallel queue dispatch, and stale JavaScript cache failures.

          This educational beta is unsigned. Windows SmartScreen or macOS Gatekeeper may require one-time confirmation.
          "@
          $notes | Set-Content release-notes.md -Encoding utf8
          gh release view "${{ inputs.release_tag }}" --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ inputs.release_tag }}" --repo "${{ github.repository }}" --title "Takeflow $($displayVersion.Trim())" --notes-file release-notes.md --prerelease
          }
          gh release upload "${{ inputs.release_tag }}" dist/installer/TakeflowSetup-*.exe dist/installer/TakeflowSetup-*.exe.sha256 --repo "${{ github.repository }}" --clobber
